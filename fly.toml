# Fly.io app config. `app` must be globally unique on Fly — change it if
# `agent-valley` is already taken (e.g. with `fly launch` interactively, or
# just edit this file before the first `fly apps create`).
app = "agent-valley"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  # SQLite file lives on the mounted volume below, not the container's
  # ephemeral filesystem, so it survives deploys/restarts.
  DATABASE_URL = "file:/data/dev.db"

[[mounts]]
  source = "agent_valley_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # This app runs an in-process tick loop (crop growth) and holds live
  # WebSocket connections even with no HTTP traffic — Fly's default
  # scale-to-zero-on-idle would silently stop both. Keep exactly one machine
  # running at all times instead (SQLite is single-writer, so more than one
  # would corrupt state anyway).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
