name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # tsc needs the generated Prisma client's types on disk to resolve
      # `@prisma/client` imports — same as a local `npm run dev`.
      - run: npx prisma generate
      - run: npx tsc --noEmit

  deploy:
    needs: typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-fly # one deploy at a time; this app runs as a single machine/volume
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Builds the Dockerfile on Fly's remote builders (no local Docker
      # needed in the runner) and rolls it out to the single always-on
      # machine defined in fly.toml.
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
